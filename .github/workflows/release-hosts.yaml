name: Release MacOS hosts

on:
  workflow_dispatch: {}
  schedule:
    - cron: 0 10 * * *

permissions:
  id-token: write
  contents: read

jobs:
  release_hosts:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # TODO use aws ssm
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/envoy-ci
          role-duration-seconds: 900
          aws-region: us-east-2
      - name: Release MacOS available hosts
        working-directory: terraform
        run: |
          ./release-hosts.sh
