name: Build (GitHub runners)
run-name: Build ${{ inputs.os }}-${{ inputs.arch }}-v${{ inputs.version }}${{ inputs.fips && '+fips' || '' }}

on:
  workflow_call:
    inputs:
      version:
        description: Envoy version to build (don't include leading v)
        type: string
        required: true
      arch:
        description: Architecture to build Envoy for
        type: string
        required: true
      os:
        description: OS to build Envoy for
        type: string
        required: true
      fips:
        description: Build FIPS (only linux amd64)
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: Envoy version to build (don't include leading v)
        type: string
        required: true
      arch:
        options:
          - amd64
          - arm64
        description: Architecture to build Envoy for Linux
        type: choice
        required: true
      os:
        options:
          - darwin
          - linux
        description: OS to build Envoy for
        type: choice
        required: true
      fips:
        description: Build FIPS (only linux amd64)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  select-runner:
    runs-on: ubuntu-24.04
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    steps:
      - name: Set runner
        id: set
        env:
          VERSION: ${{ inputs.version }}
          OS: ${{ inputs.os }}
          ARCH: ${{ inputs.arch }}
        run: |
          if [[ "$OS" == "darwin" ]]; then
            minor=""
            if [[ "$VERSION" =~ ^[0-9]+\.([0-9]+) ]]; then
              minor="${BASH_REMATCH[1]}"
            fi
            if [[ "$VERSION" == "main" || ( -n "$minor" && "$minor" -ge "35" ) ]]; then
              macos_version="15"
            else
              macos_version="14"
            fi
            if [[ "$ARCH" == "arm64" ]]; then
              echo "runner=macos-${macos_version}-xlarge" >> "$GITHUB_OUTPUT"
            else
              echo "runner=macos-${macos_version}-large" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "$ARCH" == "arm64" ]]; then
            echo "runner=ubuntu-24.04-arm" >> "$GITHUB_OUTPUT"
          else
            echo "runner=ubuntu-24.04" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: select-runner
    runs-on: ${{ needs.select-runner.outputs.runner }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Free disk space
        if: inputs.os == 'linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Install macOS dependencies
        if: inputs.os == 'darwin'
        env:
          VERSION: ${{ inputs.version }}
          ARCH: ${{ inputs.arch }}
        run: |
          minor_version=""
          if [[ "$VERSION" =~ ^[0-9]+\.([0-9]+) ]]; then
            minor_version="${BASH_REMATCH[1]}"
          fi

          brew install bash automake cmake coreutils libtool wget ninja go bazelisk

      - name: Set macOS Bazel options
        if: inputs.os == 'darwin'
        env:
          VERSION: ${{ inputs.version }}
          ARCH: ${{ inputs.arch }}
        run: |
          minor_version=""
          if [[ "$VERSION" =~ ^[0-9]+\.([0-9]+) ]]; then
            minor_version="${BASH_REMATCH[1]}"
          fi

          if [[ "$VERSION" == "main" || ( -n "$minor_version" && "$minor_version" -ge "34" ) ]]; then
            BAZEL_BUILD_EXTRA_OPTIONS="--copt=-mmacos-version-min=13.3 --host_copt=-mmacos-version-min=13.3"
          fi

          echo "BAZEL_BUILD_EXTRA_OPTIONS=${BAZEL_BUILD_EXTRA_OPTIONS}" >> "$GITHUB_ENV"

      - name: Build Envoy
        env:
          GOOS: ${{ inputs.os }}
          GOARCH: ${{ inputs.arch }}
          ENVOY_VERSION: ${{ inputs.version }}
          FIPS: ${{ inputs.fips }}
        run: |
          if [[ "$FIPS" == "true" ]]; then
            make build/envoy/fips
          else
            make build/envoy
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: envoy-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.version }}-${{ inputs.fips }}
          path: build/artifacts-${{ inputs.os }}-${{ inputs.arch }}/envoy/
          if-no-files-found: error
