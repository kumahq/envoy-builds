name: Build

on:
  workflow_call:
    inputs:
      version:
        description: Envoy version to build (don't include leading v)
        type: string
        required: true
      arch:
        description: Architecture to build Envoy for Linux
        type: string
        required: true
      os:
        description: OS to build Envoy for
        type: string
        required: true
      fips:
        description: Build FIPS (only linux amd64)
        required: false
        default: false
        type: boolean
    secrets:
      AWS_ACCOUNT_ID:
        description: AWS account ID for infrastructure
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: Envoy version to build (don't include leading v)
        type: string
        required: true
      arch:
        options:
          - amd64
          - arm64
        description: Architecture to build Envoy for Linux
        type: choice
        required: true
      os:
        options:
          - darwin
          - linux
          - windows
        description: OS to build Envoy for
        type: choice
        required: true
      fips:
        description: Build FIPS (only linux amd64)
        required: false
        default: false
        type: boolean
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: inputs.fips == false || ( inputs.fips && inputs.os == 'linux' && inputs.arch == 'amd64')
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      # TODO use aws ssm
      - name: Generate SSH key
        run: ssh-keygen -t ed25519 -q -N "" -f ~/.ssh/id_ed25519
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/envoy-ci
          role-duration-seconds: 14400
          aws-region: us-east-2
      - uses: hashicorp/setup-terraform@v3.0.0
      - run: terraform init
        working-directory: terraform
      - name: Find Mac OS dedicated host
        if: inputs.os == 'darwin'
        working-directory: terraform
        run: |
          ./find-or-create-host.sh '${{ inputs.arch }}'
      - name: Set terraform variables
        working-directory: terraform
        run: |
          cat <<EOF >> terraform.tfvars
          public_key_path = "~/.ssh/id_ed25519.pub"
          arch = "${{ inputs.arch }}"
          os = "${{ inputs.os }}"
          fips = ${{ inputs.fips }}
          envoy_version = "${{ inputs.version }}"
          EOF

          if [[ "${{ inputs.os }}" == linux ]]; then
            echo "SSH_USER=admin" >> $GITHUB_ENV
          else
            echo "SSH_USER=ec2-user" >> $GITHUB_ENV
          fi
      - run: terraform apply -input=false -auto-approve
        working-directory: terraform
        id: terraform-apply
      - id: public-ip
        working-directory: terraform
        # setup-terraform saves stdout of terraform calls to outputs
        run: terraform output --raw public_ip
      - id: instance-id
        working-directory: terraform
        # setup-terraform saves stdout of terraform calls to outputs
        run: terraform output -raw instance_id
      - name: Wait for VM to be ready
        timeout-minutes: 20
        run: |

          if [[ "${{ inputs.os }}" == windows ]]; then
            while true
            do
              instance_status=$(aws ec2 describe-instance-status --instance-ids ${{ steps.instance-id.outputs.stdout }} --no-cli-pager --query 'InstanceStatuses[0].InstanceStatus.Status' --output text)
              system_status=$(aws ec2 describe-instance-status --instance-ids ${{ steps.instance-id.outputs.stdout }} --no-cli-pager --query 'InstanceStatuses[0].SystemStatus.Status' --output text)
              if [[ $instance_status == ok && $system_status == ok ]]; then
                break
              fi
              echo "Instance not healthy, waiting..."
              sleep 5
            done
            while true; do
              command_id=$(aws ssm send-command \
                --instance-id ${{ steps.instance-id.outputs.stdout }} \
                --document-name "AWS-RunPowerShellScript" \
                --parameters commands="'echo test'" \
                --no-cli-pager \
                --query 'Command.CommandId' \
                --output text)
                if [ $? == 0 ]; then
                  break
                fi
                echo "SSM Manager not ready, waiting..."
                sleep 5
            done
          else
            while ! timeout 10 ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new ${{ env.SSH_USER }}@${{ steps.public-ip.outputs.stdout }} 'test -e ready'
            do
              sleep 5
            done
          fi
      - name: Build Envoy
        if: inputs.os != 'windows'
        run: |
          ssh ${{ env.SSH_USER }}@${{ steps.public-ip.outputs.stdout }} <<'EOF'
            set -e
            if [[ "${{ inputs.os }}" == darwin ]]; then
              export PATH="/opt/homebrew/bin:$PATH"
              export BAZEL_BUILD_EXTRA_OPTIONS="--copt=-mmacos-version-min=12.7 --host_copt=-mmacos-version-min=12.7"
            fi

            export ENVOY_VERSION="${{ inputs.version }}"
            REPO="${{ github.repository }}"
            git clone "https://github.com/$REPO" && cd "${REPO#${{ github.repository_owner }}/}"
            git checkout ${{ github.sha }}

            if [[ ${{ inputs.fips }} == true ]]; then
              make build/envoy/fips
            else
              make build/envoy
            fi

            mv build ..
          EOF
      - name: Build Envoy Windows
        if: inputs.os == 'windows'
        run: |
          if [[ ${{ inputs.version }} == main ]]; then
            version=main
          else
            version=v${{ inputs.version }}
          fi
          command_id=$(aws ssm send-command \
            --instance-id ${{ steps.instance-id.outputs.stdout }} \
            --document-name "AWS-RunPowerShellScript" \
            --parameters commands="'cd C:/envoy; C:\tools\git\bin\git.exe checkout $version; C:\tools\git\bin\bash.exe -c \\'TEMP=C: /c/envoy/ci/run_envoy_docker.sh ./ci/windows_ci_steps.sh //source/exe:envoy-static\\''" \
            --no-cli-pager \
            --query 'Command.CommandId' \
            --output text \
            --output-s3-bucket-name "envoy-windows-binary" --output-s3-key-prefix "envoy-build-logs-$version")
          echo $command_id  
          while true; do
            status=$(aws ssm get-command-invocation --instance-id ${{ steps.instance-id.outputs.stdout }} --command-id $command_id --query 'Status' --no-cli-pager --output text)
            if [[ "$status" == 'Success' ]]; then
              break
            fi
            
            sleep 5
          done

          # check if is success
          aws s3 cp s3://envoy-windows-binary/envoy-build-logs-$version/$command_id/${{ steps.instance-id.outputs.stdout }}/awsrunPowerShellScript/0.awsrunPowerShellScript/stderr .
          if grep -iqF "Build completed successfully" stderr
          then
            echo "Build completed successfully"
          else
            cat stderr
            exit 1
          fi

          command_id=$(aws ssm send-command \
              --instance-id ${{ steps.instance-id.outputs.stdout }} \
              --document-name "AWS-RunPowerShellScript" \
              --parameters commands="'mv C:\envoy-docker-build\envoy\envoy_binary.tar.gz C:\envoy-docker-build\envoy\envoy_binary_$version.tar.gz'" \
              --no-cli-pager \
              --query 'Command.CommandId' \
              --output text)
          echo $command_id  
          while true; do
            status=$(aws ssm get-command-invocation --instance-id ${{ steps.instance-id.outputs.stdout }} --command-id $command_id --query 'Status' --no-cli-pager --output text)
            if [[ "$status" == 'Success' ]]; then
              break
            fi
            sleep 5
          done

          command_id=$(aws ssm send-command \
              --instance-id ${{ steps.instance-id.outputs.stdout }} \
              --document-name "AWS-RunPowerShellScript" \
              --parameters commands="'aws s3 cp C:\envoy-docker-build\envoy\envoy_binary_$version.tar.gz s3://envoy-windows-binary'" \
              --no-cli-pager \
              --query 'Command.CommandId' \
              --output text)
          echo $command_id  
          while true; do
            status=$(aws ssm get-command-invocation --instance-id ${{ steps.instance-id.outputs.stdout }} --command-id $command_id --query 'Status' --no-cli-pager --output text)
            if [[ "$status" == 'Success' ]]; then
              break
            fi
            
            sleep 5
          done
          mkdir envoy
          aws s3 cp s3://envoy-windows-binary/envoy_binary_$version.tar.gz .
          tar xzf envoy_binary_$version.tar.gz
          mv envoy.exe envoy/envoy-$version
      - name: Download Envoy binaries
        if: inputs.os != 'windows'
        run: |
          envoy_dir="~/build/artifacts-${{ inputs.os }}-${{ inputs.arch }}/envoy"
          scp -o StrictHostKeyChecking=no -r ${{ env.SSH_USER }}@${{ steps.public-ip.outputs.stdout }}:${envoy_dir} .
      - uses: actions/upload-artifact@v4
        with:
          name: envoy-${{ inputs.os }}-${{ inputs.arch }}-${{ inputs.fips }}
          path: envoy/
          if-no-files-found: error
      - run: terraform destroy -input=false -auto-approve
        working-directory: terraform
        if: always() && steps.terraform-apply.outcome != 'skipped'
